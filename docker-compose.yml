# Полный стек: backend (FastAPI) + дашборд (статика через nginx).
# Для запуска только backend см. backend/ai_pricing_market_mvp/docker-compose.yml
services:
  backend:
    build: ./backend/ai_pricing_market_mvp
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      WEB_CONCURRENCY: "2"
      # Дашборду ниже нужен явный origin в allowlist — CORS закрыт по умолчанию.
      AI_PRICING_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  dashboard:
    build: ./frontend/dashboard
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
