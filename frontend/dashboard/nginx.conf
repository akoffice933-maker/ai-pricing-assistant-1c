server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # connect-src разрешает http:/https: широко, а не конкретный домен — дашборд
    # намеренно позволяет указать любой backend URL в настройках (localhost или иначе),
    # так что заранее ограничить его нельзя. Главная защита — script-src 'self': это
    # не даёт выполниться постороннему JS, даже если атакующий как-то впрыснет разметку.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http: https:; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
