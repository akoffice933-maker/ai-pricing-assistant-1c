name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ai_pricing_market_mvp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Run tests
        run: pytest -q
      - name: Smoke-test backtest harness
        working-directory: .
        run: python scripts/backtest_elasticity.py backend/ai_pricing_market_mvp/examples/backtest_sample.csv
      - name: Build Docker image
        run: docker build -t ai-pricing-market-mvp:ci .

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Build
        run: npm run build
