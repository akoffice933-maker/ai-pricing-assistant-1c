name: Python check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dev dependencies
        run: |
          cd backend/ai_pricing_market_mvp
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Compile backend and scripts
        run: |
          python -m py_compile backend/ai_pricing_market_mvp/main.py scripts/calculate_market_indicators.py
      - name: Run backend smoke tests
        run: |
          cd backend/ai_pricing_market_mvp
          pytest -q
