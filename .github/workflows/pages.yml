name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: frontend/dashboard
        run: npm ci

      - name: Build dashboard (subpath /app/)
        working-directory: frontend/dashboard
        run: npx vite build --base=/ai-pricing-assistant-1c/app/

      - name: Assemble Pages site
        run: |
          mkdir -p site
          cp -r docs/. site/
          mkdir -p site/app
          cp -r frontend/dashboard/dist/. site/app/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
